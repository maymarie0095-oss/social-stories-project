<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Social Story</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  
  <div class = "dentist_header">
    <h4>Choose a Story</h1>
  </div>
  
  <select id="storySelect" class = "story_select">
    <option value="dentist">Going to the Dentist</option>
  </select>

  <button id="startStory" class = "start_story">Start Story</button>

  <div id="storyViewer" class="story-viewer" style="display:none;">
    <div id="storyText"></div>

    <button id="backBtn">Back</button>
    <button id="nextBtn">Next</button>
    <button id="printBtn">Print / Save as PDF</button>
  </div>

  <script src="js/stories.js"></script>
  <script src="js/viewer.js"></script>
  <script src="js/theme.js"></script>
</body>
</html>
